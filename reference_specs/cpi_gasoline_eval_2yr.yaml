# Reference EvalSpec: CPI Gasoline Canada, 12-month ahead — 2-year eval window
#
# Companion to cpi_gasoline_12m.yaml.  Covers a short, held-out 2-year
# window (2024–2026) intended for estimating how well a predictor tuned
# on the backtest actually generalises.  It is deliberately protected:
#
#   - Use the backtest spec (cpi_gasoline_12m.yaml) for learning, tuning,
#     and exploration — it is designed to be run many times.
#   - Use this eval spec sparingly.  max_runs: 5 limits how many times a
#     participant may run evaluate() against it, reducing the risk of
#     inadvertently over-fitting to the held-out window.
#
# To load this spec in Python:
#
#   import yaml
#   from pathlib import Path
#   from aieng.forecasting.evaluation import EvalSpec, EvalTracker, evaluate
#
#   with open("reference_specs/cpi_gasoline_eval_2yr.yaml") as f:
#       spec = EvalSpec.model_validate(yaml.safe_load(f))
#
#   tracker = EvalTracker(Path("data/eval_runs.yaml"))
#   result = evaluate(predictor=my_predictor, spec=spec, data_service=svc, tracker=tracker)
#   print(f"Eval mean CRPS: {result.mean_crps:.4f}  (run {result.run_number}/{spec.max_runs})")
#
# The target series must be registered before running.  Use
# scripts/fetch_cpi.py to populate the local data cache, then register
# "cpi_gasoline_canada".

spec_id: cpi_gasoline_eval_2yr

task:
  task_id: cpi_gasoline_canada_12m
  target_series_id: cpi_gasoline_canada
  horizons: [12]
  frequency: MS
  description: >-
    Forecast Canada-wide CPI Gasoline (index, 2002=100) exactly 12 months
    ahead of the forecast origin. Evaluated at January and July origins.
    Ground truth is the observed StatCan CPI value at the resolution date.

# Eval window: January 2024 through January 2026 (recent, held-out data).
start: "2024-01-01"
end: "2026-01-01"

# stride=6 on monthly (MS) frequency gives January and July origins.
stride: 6

# Require 24 months of history before the first forecast.
warmup: 24

# Budget cap: each participant may run evaluate() against this spec at
# most 5 times.  Enforced by EvalTracker when passed to evaluate().
max_runs: 5

description: >-
  Getting-started protected eval: 2-year held-out window for CPI Gasoline
  Canada 12-month ahead forecasts.  Budget-limited to 5 runs per
  participant tracker.
